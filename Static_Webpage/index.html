<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #0066cc;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Dog Image Gallery</h1>
  <p>Sample dog images with Google search links</p>

  <div class="gallery">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=800&q=80" alt="Dog 1">
      <a href="https://www.google.com/search?tbm=isch&q=golden+retriever" target="_blank">Search more on Google</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&w=800&q=80" alt="Dog 2">
      <a href="https://www.google.com/search?tbm=isch&q=husky+dog" target="_blank">Search more on Google</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d?auto=format&fit=crop&w=800&q=80" alt="Dog 3">
      <a href="https://www.google.com/search?tbm=isch&q=puppy+dog" target="_blank">Search more on Google</a>
    </div>
  </div>
</body>
</html>
